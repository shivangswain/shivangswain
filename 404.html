<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>404 - Page Not Found | Shivang P Swain</title>

	<!-- Anti-FOUC theme bootstrap (mirrors index.html) -->
	<script>
		(function () {
			try {
				var t = localStorage.getItem("theme");
				if (t !== "light" && t !== "dark" && t !== "root") {
					t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
				}
				if (t !== "root") document.documentElement.classList.add(t + "-mode");
			} catch (_) { }
		})();
	</script>

	<!-- SEO: keep error pages out of the index. -->
	<meta name="author" content="Shivang P Swain" />
	<meta name="description" content="404 - page not found." />
	<meta name="robots" content="noindex, follow" />

	<!-- Favicons -->
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
	<link rel="shortcut icon" href="/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
	<meta name="theme-color" content="#1c2f8c" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#171717" media="(prefers-color-scheme: dark)" />

	<!-- Preconnect + Open Runde preload, mirroring the home page. -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/OpenRunde-Regular.woff2" />

	<link rel="stylesheet" href="/src/style.css" />

	<!-- Material Symbols, glyph-subset from Google Fonts; async swap, falls back
	     to the self-hosted face if the CDN is unreachable. -->
	<link rel="preload" as="style"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap&icon_names=arrow_forward,dark_mode,light_mode,star"
		onload="this.onload=null;this.rel='stylesheet'" />
	<noscript>
		<link rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap&icon_names=arrow_forward,dark_mode,light_mode,star" />
	</noscript>

	<script type="module" src="/src/themeToggle.ts"></script>
</head>

<body>
	<div id="noise" aria-hidden="true"></div>
	<main>
		<div class="content">
			<div class="center">
				<h1 class="error">404</h1>
				<p>
					The page you're looking for doesn't exist.
					<a href="/" class="go-home">Go home</a>?
				</p>
			</div>
		</div>
		<footer class="footer">
			<button id="theme-toggle" type="button" aria-label="Toggle colour theme">
				<i class="material-symbols-rounded" aria-hidden="true">light_mode</i>
			</button>
		</footer>
	</main>
</body>

</html>
